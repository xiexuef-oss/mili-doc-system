server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 256

spring:
  mvc:
    async:
      request-timeout: 300000  # 5min for long SSE connections
  web:
    resources:
      chain:
        compressed: true
  application:
    name: military-doc-system
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/mili-doc?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: postgres
    password: ${DB_PASSWORD:303319}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      resolve-lazily: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 6
    # TIP: 旧版 SQL 脚本在 resources/sql/migration_v*.sql（无需 Flyway 管理）
    #      种子数据在 resources/sql/seed_*.sql 和 db/seed/（手动执行）
    encoding: UTF-8

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.military.doc.modules.*.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:military-doc-jwt-secret-key-2026}
  expiration: ${JWT_EXPIRATION:86400000}

minio:
  enabled: false
  endpoint: http://localhost:9000
  accessKey: ${MINIO_ACCESS_KEY:}
  secretKey: ${MINIO_SECRET_KEY:}
  bucket: military-doc

knife4j:
  enable: true
  openapi:
    title: 军工项目文档策划与编制一体机 API
    version: 1.0.0
    description: 提供项目、文档、会议评审、知识库等核心功能的RESTful API

ocr:
  enabled: true
  tesseract-path: C:/Program Files/Tesseract-OCR/tesseract.exe
  language: chi_sim+eng
  dpi: 400
  timeout-seconds: 120

llm:
  provider: deepseek
  base-url: https://api.deepseek.com
  api-key: ${DEEPSEEK_API_KEY:dev-default-key}
  model: deepseek-v4-flash
  temperature: 0.7
  max-tokens: 2048
  timeout-seconds: 30
  providers:
    deepseek:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:dev-default-key}
      model: deepseek-v4-pro
    ollama:
      base-url: http://localhost:11434
      model: qwen2.5:7b

embedding:
  enabled: true
  base-url: http://localhost:11434
  model: nomic-embed-text
  dimension: 768
  batch-size: 5
  semantic-rag-enabled: true