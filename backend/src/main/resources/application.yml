server:
  port: 8080
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 256

spring:
  web:
    resources:
      chain:
        compressed: true
  application:
    name: military-doc-system
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/mili-doc?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: postgres
    password: "303319"
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.military.doc.modules.*.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: military-doc-system-jwt-secret-key-2024
  expiration: 86400000

minio:
  enabled: false
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: military-doc

knife4j:
  enable: true
  openapi:
    title: 军工项目文档策划与编制一体机 API
    version: 1.0.0
    description: 提供项目、文档、会议评审、知识库等核心功能的RESTful API